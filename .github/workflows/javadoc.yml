name: Javadoc

on:
    push:
        branches:
            - stable

jobs:
    generate-javadoc:
        runs-on: ubuntu-latest

        steps:
            # Paso 1: Checkout del código fuente
            - name: Checkout code
              uses: actions/checkout@v3

            # Paso 2: Configurar Java (asegúrate de usar la versión adecuada de Java)
            - name: Set up JDK 11
              uses: actions/setup-java@v3
              with:
                  java-version: '11'
                  distribution: ''

            # Paso 3: Subir Javadoc ya generado (en este caso, los archivos generados están en la carpeta 'docs')
            - name: Upload existing Javadoc
              run: |
                  cp -R docs/* $GITHUB_WORKSPACE/javadoc/

            # Paso 4: Publicar Javadoc en GitHub Pages
            - name: Publish Javadoc to GitHub Pages
              uses: peaceiris/actions-gh-pages@v3
              with:
                  personal_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./javadoc
                  publish_branch: gh-pages
