name: javadoc
on:
  push:
    branches: [main, stable] 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Generate
        run: |
          javadoc -d docs -sourcepath src/main/java -subpackages . -encoding UTF-8 -charset UTF-8 -docencoding UTF-8
          touch docs/.nojekyll
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          

